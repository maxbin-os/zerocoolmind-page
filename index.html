<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerocoolmind | 个人独立站</title>
    <style>
        /* 现代极简主义 CSS 样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            overflow: hidden;
            position: relative;
        }

        /* 背景装饰微动效 */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #6366f1, #a855f7);
            border-radius: 50%;
            top: 15%;
            left: 20%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 玻璃拟态主卡片 */
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 头像动效 */
        .avatar {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
            user-select: none;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* 按钮功能列表 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #f1f5f9;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .btn:hover {
            background: #ffffff;
            color: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar">🔮</div>
        
        <h1>Zerocoolmind</h1>
        <p class="tagline">探索未知，独立思考。这里是我的数字自留地。</p>
        
        <div class="links">
            <a href="https://github.com/maxbin-os" target="_blank" class="btn">📂 我的 GitHub 仓库</a>
            <a href="#" class="btn">✍️ 个人博客 / 记事本</a>
            <a href="mailto:your-email@example.com" class="btn">✉️ 联系我 / 合作</a>
        </div>
        
        <div class="footer">
            © 2026 Zerocoolmind. Powered by Cloudflare
        </div>
    </div>

</body>
</html>
