<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        /* 极致静谧的黑白极简美学 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            letter-spacing: 0.05em;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            color: #ffffff;
            /* 优雅的淡入动画 */
            animation: fadeIn 1.5s ease-in-out forwards;
            opacity: 0;
        }

        p {
            font-size: 1rem;
            font-weight: 300;
            color: #888888;
            max-width: 500px;
            line-height: 1.6;
            animation: fadeIn 2s ease-in-out 0.5s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Stay Curious.</h1>
        <p>Something interesting is being built here. Check back later.</p>
    </div>

</body>
</html>
